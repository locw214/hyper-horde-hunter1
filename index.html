<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyper Horde Hunter</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #050505; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 480px;
            height: 890px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
        }
        canvas { display: block; background: #000; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="890"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let score = 0, level = 1, hp = 5, highscore = 0;
    let gameRunning = false;
    let lastSpawn = 0, lastShot = 0;
    let enemySpeed = 3.8, spawnRate = 550, fireRate = 140;
    let weaponLevel = 1, playerSpeed = 8, bossesDefeated = 0;
    let currentPlayerName = "";

    const player = { x: 220, y: 780, w: 40, h: 50 };
    let projectiles = [], enemies = [], particles = [], powerups = [];
    let boss = null;
    const keys = {};
    let stars = [];
    let cheatInput = "";
    let leaderboard = [];

    try { leaderboard = JSON.parse(localStorage.getItem('hyperHordeLB')) || []; } catch(e){}

    function saveLeaderboard() {
        try { localStorage.setItem('hyperHordeLB', JSON.stringify(leaderboard)); } catch(e){}
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 7 + 3;
            this.speedX = (Math.random() - 0.5) * 14;
            this.speedY = (Math.random() - 0.5) * 14;
            this.life = 1;
            this.color = color;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.035; }
        draw() {
            ctx.fillStyle = `rgba(${this.color},${this.life})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    function createExplosion(x, y, color, count = 35) {
        for(let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
    }

    function createStars() {
        stars = [];
        for(let i = 0; i < 120; i++) {
            stars.push({x: Math.random()*480, y: Math.random()*890, size: Math.random()*3 + 0.8, speed: Math.random()*1.2 + 0.6});
        }
    }

    function spawnEnemy() {
        if (boss) return;
        const size = 28 + Math.random() * 28;
        enemies.push({ 
            x: Math.random() * (canvas.width - size), 
            y: -50, 
            size: size, 
            hp: Math.ceil(level / 2) || 1, 
            speed: enemySpeed * (0.85 + Math.random() * 0.5) 
        });
    }

    function spawnPowerup() {
        powerups.push({ x: Math.random() * (canvas.width - 40), y: -40, size: 34, speed: 2.3 });
    }

    function shoot() {
        const now = Date.now();
        if (now - lastShot < fireRate) return;
        lastShot = now;
        const px = player.x + 20;
        projectiles.push({x: px, y: player.y, vx: 0, vy: -18});
        if (weaponLevel >= 2) {
            projectiles.push({x: px-14, y: player.y+6, vx: -4.5, vy: -16});
            projectiles.push({x: px+14, y: player.y+6, vx: 4.5, vy: -16});
        }
    }

    function startGame() {
        currentPlayerName = "Player"; // временно, пока нет меню
        startGameLogic(1);
    }

    function startGameLogic(startLvl) {
        level = startLvl;
        score = 0;
        hp = 5;
        projectiles = []; enemies = []; particles = []; powerups = []; boss = null;
        createStars();
        gameRunning = true;
        lastSpawn = Date.now() - 300;
    }

    function endGame() {
        gameRunning = false;
        setTimeout(() => {
            alert("Game Over! Score: " + score);
            location.reload();
        }, 500);
    }

    function update() {
        if (!gameRunning) return requestAnimationFrame(update);

        if (keys['ArrowLeft'] && player.x > 0) player.x -= playerSpeed;
        if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += playerSpeed;
        if (keys['Space']) shoot();

        if (Date.now() - lastSpawn > spawnRate) {
            spawnEnemy();
            lastSpawn = Date.now();
        }

        if (Math.random() < 0.009) spawnPowerup();

        // Пули
        for (let i = projectiles.length-1; i >= 0; i--) {
            projectiles[i].y += projectiles[i].vy;
            if (projectiles[i].y < -30) projectiles.splice(i,1);
        }

        // Враги
        for (let i = enemies.length-1; i >= 0; i--) {
            const e = enemies[i];
            e.y += e.speed;

            if (e.y > canvas.height - 30) {
                hp = Math.max(0, hp - 1);
                createExplosion(e.x + e.size/2, canvas.height - 40, "255,80,80", 25);
                enemies.splice(i,1);
                if (hp <= 0) endGame();
                continue;
            }

            // Столкновение с игроком
            if (e.x < player.x + player.w && e.x + e.size > player.x && 
                e.y < player.y + player.h && e.y + e.size > player.y) {
                hp = Math.max(0, hp - 1);
                createExplosion(e.x + e.size/2, e.y + e.size/2, "255,50,50", 30);
                enemies.splice(i,1);
                if (hp <= 0) endGame();
                continue;
            }

            // Урон от пуль
            for (let j = projectiles.length-1; j >= 0; j--) {
                const p = projectiles[j];
                if (p.x > e.x && p.x < e.x + e.size && p.y > e.y && p.y < e.y + e.size) {
                    e.hp--;
                    projectiles.splice(j,1);
                    if (e.hp <= 0) {
                        createExplosion(e.x + e.size/2, e.y + e.size/2, "255,140,40", 40);
                        enemies.splice(i,1);
                        score += 1;
                    }
                    break;
                }
            }
        }

        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i,1);
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = 'rgba(5,5,5,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

        ctx.shadowBlur = 30; ctx.shadowColor = "#00ffff";
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.moveTo(player.x + 20, player.y);
        ctx.lineTo(player.x, player.y + 48);
        ctx.lineTo(player.x + 40, player.y + 48);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.shadowBlur = 18; ctx.shadowColor = "#ffff00";
        ctx.fillStyle = "#ffff00";
        projectiles.forEach(p => ctx.fillRect(p.x - 3, p.y, 6, 22));
        ctx.shadowBlur = 0;

        ctx.shadowBlur = 22; ctx.shadowColor = "#ff3366";
        enemies.forEach(e => {
            ctx.fillStyle = `rgb(255, ${70 + e.hp*45}, 80)`;
            ctx.fillRect(e.x, e.y, e.size, e.size);
        });
        ctx.shadowBlur = 0;
    }

    requestAnimationFrame(update);
    createStars();
</script>
</body>
</html>
