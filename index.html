<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper Horde Hunter</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #050505; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 480px;
            height: 640px;
            border: 8px solid #00ffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
        }
        canvas { display: block; background: #000; }

        #lobby { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5,5,5,0.97); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; gap: 20px;
        }
        h1 { font-size: 42px; background: linear-gradient(90deg, #00ffff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        input { padding: 12px 20px; font-size: 20px; background: #111; color: #00ffff; border: 3px solid #00ffff; border-radius: 12px; width: 280px; text-align: center; }
        button { padding: 12px 40px; font-size: 22px; background: transparent; color: #00ffff; border: 3px solid #00ffff; border-radius: 50px; cursor: pointer; }
        button:hover { background: #00ffff; color: #000; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #leaderboard { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5,5,5,0.98); z-index: 200; flex-direction: column; 
            align-items: center; justify-content: center; gap: 15px;
        }
        .lb-container { background: #0a0a0a; padding: 25px; border-radius: 20px; border: 2px solid #00ffff; }
        table { border-collapse: collapse; width: 100%; max-width: 380px; }
        th, td { padding: 10px 15px; text-align: center; }
        th { background: #00ffff; color: #000; }
        tr:nth-child(even) { background: #1a1a1a; }

        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 18px; }
        #msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 36px; display: none; z-index: 20; text-align: center; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="lobby">
            <h1>HYPER HORDE HUNTER</h1>
            <div style="font-size:24px; color:#ff00ff;">HIGHSCORE: <span id="highscoreValue">0</span></div>
            <input type="text" id="playerName" placeholder="Enter nickname" maxlength="12">
            <button id="startBtn" onclick="startGame()" disabled>START GAME</button>
            <button onclick="showLeaderboard()">LEADERBOARD</button>

            <div id="levelSelect">
                <p style="color:#ff00ff;">Select starting level:</p>
                <select id="levelChooser">
                    <option value="1">Level 1</option>
                    <option value="4">Level 4 — Boss 1</option>
                    <option value="9">Level 9 — Boss 2</option>
                    <option value="14">Level 14 — FINAL BOSS</option>
                </select>
                <button onclick="startWithSelectedLevel()">START SELECTED LEVEL</button>
            </div>
        </div>

        <div id="leaderboard">
            <div class="lb-container">
                <h2 style="color:#ff00ff; margin:0 0 15px 0;">🏆 LEADERBOARD</h2>
                <table id="leaderTable"></table>
            </div>
            <button onclick="hideLeaderboard()" style="margin-top:15px;">CLOSE</button>
        </div>

        <div id="ui">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Level: <span id="level">1</span></div>
            <div class="stat">Lives: <span id="hp">|||||</span></div>
        </div>
        <div id="msg"></div>
        
        <canvas id="gameCanvas" width="480" height="640"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0, level = 1, hp = 5, highscore = 0;
    let gameRunning = false;
    let lastSpawn = 0, lastShot = 0;
    let enemySpeed = 3.8, spawnRate = 550, fireRate = 140;
    let weaponLevel = 1, playerSpeed = 8, bossesDefeated = 0;
    let currentPlayerName = "";

    const player = { x: 220, y: 550, w: 40, h: 50 };
    let projectiles = [], enemies = [], particles = [], powerups = [];
    let boss = null;
    const keys = {};
    let stars = [];
    let cheatInput = "";
    let leaderboard = [];

    try { leaderboard = JSON.parse(localStorage.getItem('hyperHordeLB')) || []; } catch(e){}

    function saveLeaderboard() {
        try { localStorage.setItem('hyperHordeLB', JSON.stringify(leaderboard)); } catch(e){}
    }

    function updateLeaderboardTable() {
        let html = `<tr><th>#</th><th>Player</th><th>Score</th></tr>`;
        leaderboard.slice(0, 10).forEach((entry, i) => {
            html += `<tr><td>${i+1}</td><td>${entry.name}</td><td>${entry.score}</td></tr>`;
        });
        if (leaderboard.length === 0) html += `<tr><td colspan="3">No records yet</td></tr>`;
        document.getElementById('leaderTable').innerHTML = html;
    }

    function showLeaderboard() {
        updateLeaderboardTable();
        document.getElementById('leaderboard').style.display = 'flex';
    }

    function hideLeaderboard() {
        document.getElementById('leaderboard').style.display = 'none';
    }

    const playerNameInput = document.getElementById('playerName');
    const startBtn = document.getElementById('startBtn');
    playerNameInput.addEventListener('input', () => startBtn.disabled = playerNameInput.value.trim() === "");

    // ... (остальной код игры такой же, как раньше)

    function createStars() {
        stars = [];
        for(let i = 0; i < 120; i++) {
            stars.push({x: Math.random()*480, y: Math.random()*640, size: Math.random()*3 + 0.8, speed: Math.random()*1.2 + 0.6});
        }
    }

    // (Я сократил код для сообщения. Если нужно полный — скажи "Дай полный код")

    requestAnimationFrame(update);
    createStars();
</script>
</body>
</html>
