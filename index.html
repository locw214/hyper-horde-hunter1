<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyper Horde Hunter</title>
    <style>
        body { margin:0; padding:0; background:#0a001a; color:white; font-family:'Segoe UI',sans-serif; overflow:hidden; display:flex; justify-content:center; align-items:flex-start; height:100vh; }
        #gameContainer { position:relative; width:480px; height:890px; overflow:hidden; box-shadow:0 0 100px rgba(0,255,255,0.9); border:7px solid #00ffff; border-radius:25px; transform-origin:top center; transition:transform 0.25s; }
        canvas { display:block; background:#000; }

        #lobby, #levelSelect, #leaderboard, #comments, #settings {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:linear-gradient(135deg, #0f0022, #3a0055);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:100; gap:35px;
        }
        #levelSelect, #leaderboard, #comments, #settings { display:none; }
        .zoom-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:85%; }
        .zoom-btn { padding:16px 0; font-size:20px; border-radius:16px; text-align:center; cursor:pointer; background:rgba(20,10,60,0.9); color:#00ffff; border:3px solid #00ffff44; transition:0.3s; }
        .zoom-btn:hover, .zoom-btn.active { background:#00ffff22; border-color:#00ffff; transform:scale(1.06); }
        .zoom-btn.active { border-color:#ffff00; color:#ffff00; }

        #commentsPanel { display:flex; flex-direction:column; width:90%; height:78%; gap:0; }
        #commentsList { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:10px 4px; scrollbar-width:thin; scrollbar-color:#00ffff33 transparent; }
        .comment-item { display:flex; gap:10px; align-items:flex-start; }
        .comment-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:16px; flex-shrink:0; border:2px solid rgba(0,255,255,0.4); }
        .comment-body { flex:1; }
        .comment-name { font-size:13px; color:#00ffff; font-weight:bold; }
        .comment-text { font-size:15px; color:#eee; margin-top:2px; word-break:break-word; }
        .comment-time { font-size:11px; color:#ffffff55; margin-top:2px; }
        #commentInput { display:flex; gap:8px; padding:10px 0 0; border-top:1px solid #00ffff33; margin-top:6px; }
        #commentInput input { flex:1; padding:10px 14px; font-size:15px; border-radius:12px; border:2px solid #00ffff66; background:rgba(0,0,30,0.8); color:white; }
        #commentInput button { padding:10px 18px; font-size:15px; border-radius:12px; white-space:nowrap; }

        h1 { font-size:56px; letter-spacing:4px; background:linear-gradient(90deg, #00ffff, #ff00ff, #ffff00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation: neonGlow 1.5s infinite alternate; }
        @keyframes neonGlow { from {text-shadow:0 0 30px #ff00ff;} to {text-shadow:0 0 60px #00ffff, 0 0 100px #ff00ff;} }

        input, button, select { padding:18px 38px; font-size:23px; background:rgba(20,10,60,0.9); color:#00ffff; border:4px solid #00ffff; border-radius:20px; transition:0.4s; cursor:pointer; }
        button:hover { background:#00ffff; color:#000; transform:scale(1.12); }

        #myRecordBtn {
            position: absolute; top: 14px; right: 14px; z-index: 200;
            padding: 6px 14px; font-size: 13px;
            background: rgba(0,255,100,0.2); border: 2px solid #00ff88; border-radius:12px;
        }

        table { border-collapse:collapse; width:85%; color:white; }
        th, td { padding:12px; text-align:center; border-bottom:1px solid #00ffff44; }
        th { color:#00ffff; }

        #ui { position:absolute; top:20px; left:20px; z-index:10; font-size:20px; }
        #msg { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:52px; font-weight:bold; z-index:30; text-shadow:0 0 35px #0f0; display:none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="lobby">
        <h1>HYPER HORDE HUNTER</h1>
        <p style="margin:0;color:#ff2222;font-size:22px;font-weight:900;text-align:center;text-shadow:0 0 12px #ff0000;letter-spacing:1px;">SPIL BLIV LUKKET I ONSDAG ELLER TORSDAG</p>
        <input type="text" id="playerName" placeholder="Enter nickname" maxlength="12">
        <button id="startBtn" onclick="startGame()" disabled>START GAME</button>
        <button onclick="showGlobalLeaderboard()">🌐 GLOBAL LEADERBOARD</button>
        <button id="myRecordBtn" onclick="showMyRecords()">MY RECORD</button>
        <button onclick="showComments()" style="background:rgba(255,0,200,0.15);border-color:#ff00cc;">💬 COMMENTS</button>
        <button onclick="showSettings()" style="background:rgba(100,100,255,0.15);border-color:#8888ff;">⚙️ SETTINGS</button>
    </div>

    <div id="settings">
        <h2 style="color:#8888ff;margin:0;">⚙️ SETTINGS</h2>
        <p style="color:#aaa;margin:0;font-size:16px;">Zoom — pick the size that fits your screen</p>
        <div class="zoom-grid">
            <div class="zoom-btn" style="grid-column:1/-1;background:rgba(136,136,255,0.2);border-color:#8888ff;color:#fff;" onclick="autoFitZoom()">🔍 AUTO FIT SCREEN</div>
            <div class="zoom-btn" onclick="setZoom(0.5)">50%<br><span style="font-size:12px;opacity:0.6">tiny</span></div>
            <div class="zoom-btn" onclick="setZoom(0.6)">60%</div>
            <div class="zoom-btn" onclick="setZoom(0.7)">70%</div>
            <div class="zoom-btn" onclick="setZoom(0.8)">80%</div>
            <div class="zoom-btn" onclick="setZoom(0.9)">90%</div>
            <div class="zoom-btn" onclick="setZoom(1.0)">100%<br><span style="font-size:12px;opacity:0.6">default</span></div>
        </div>
        <button onclick="hideSettings()">Back</button>
    </div>

    <div id="comments">
        <h2 style="color:#ff00ff;margin:0;">💬 COMMUNITY</h2>
        <div id="commentsPanel">
            <div id="commentsList"><div style="color:#ffffff55;text-align:center;margin-top:40px">Loading...</div></div>
            <div id="commentInput">
                <input id="commentText" type="text" placeholder="Write a comment..." maxlength="200">
                <button onclick="sendComment()">Send</button>
            </div>
        </div>
        <button onclick="hideComments()">Close</button>
    </div>

    <div id="levelSelect">
        <h2 style="color:#ff00ff;">Choose Starting Level</h2>
        <select id="levelChooser">
            <option value="1">Level 1</option>
            <option value="5">Level 5</option>
            <option value="9">Level 9 - Boss 1</option>
            <option value="12">Level 12 - Boss 2</option>
            <option value="14">Level 14 - FINAL BOSS</option>
        </select>
        <button onclick="startWithSelectedLevel()">Start Selected Level</button>
        <button onclick="hideLevelSelect()">Cancel</button>
    </div>

    <div id="leaderboard">
        <h2 id="leaderTitle" style="color:#ff00ff;">🏆 LEADERBOARD</h2>
        <table id="leaderTable"></table>
        <button onclick="hideLeaderboard()">Close</button>
    </div>

    <div id="ui">
        Score: <span id="score">0</span><br>
        Level: <span id="level">1</span><br>
        Lives: <span id="hp">|||||</span><br>
        <span id="autoShootIndicator" style="display:none;color:#ff0;font-size:14px;">🔫 AUTO</span>
    </div>
    <div id="msg"></div>
    <canvas id="gameCanvas" width="480" height="890"></canvas>
</div>

<script>
    // ============================================================
    // GLOBAL LEADERBOARD — powered by Replit backend
    // After you deploy your Replit project, replace this URL with
    // your permanent *.replit.app address.
    // ============================================================
    const API_BASE = "https://0892bccc-7c02-43fe-b5a8-670d0bfea795-00-1qvpz0cqr2i5s.riker.replit.dev/api";

    async function fetchGlobalScores(limit = 50) {
        try {
            const res = await fetch(`${API_BASE}/scores?limit=${limit}`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) { return []; }
    }

    async function submitScore(name, score) {
        try {
            await fetch(`${API_BASE}/scores`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, score }),
            });
        } catch(e) {}
    }

    function updateLeaderboardTable(data) {
        if (!data || data.length === 0) {
            document.getElementById('leaderTable').innerHTML = "<tr><td colspan='4'>No records yet</td></tr>";
            return;
        }
        let html = `<tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>`;
        data.forEach((entry, i) => {
            const date = new Date(entry.createdAt).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            html += `<tr><td>${i+1}</td><td>${entry.name}</td><td>${entry.score}</td><td>${date}</td></tr>`;
        });
        document.getElementById('leaderTable').innerHTML = html;
    }

    async function showGlobalLeaderboard() {
        document.getElementById('leaderTitle').innerText = "🏆 GLOBAL LEADERBOARD";
        document.getElementById('leaderboard').style.display = 'flex';
        try {
            const data = await fetchGlobalScores(10);
            updateLeaderboardTable(data);
        } catch(e) {
            document.getElementById('leaderTable').innerHTML = "<tr><td colspan='4'>Failed to load scores</td></tr>";
        }
    }

    async function showMyRecords() {
        document.getElementById('leaderTitle').innerText = "📊 MY RECORDS";
        document.getElementById('leaderboard').style.display = 'flex';
        try {
            const all = await fetchGlobalScores(200);
            const mine = all.filter(e => e.name === currentPlayerName);
            updateLeaderboardTable(mine);
        } catch(e) {
            document.getElementById('leaderTable').innerHTML = "<tr><td colspan='4'>Failed to load scores</td></tr>";
        }
    }

    function hideLeaderboard() {
        document.getElementById('leaderboard').style.display = 'none';
    }

    // ==================== COMMENTS ====================
    const AVATAR_COLORS = ["#ff4466","#ff8800","#ffdd00","#44ff88","#00ddff","#aa44ff","#ff44dd"];
    function avatarColor(name) { let h = 0; for(let c of name) h = (h*31 + c.charCodeAt(0)) % AVATAR_COLORS.length; return AVATAR_COLORS[h]; }
    function timeAgo(dateStr) {
        const s = Math.floor((Date.now() - new Date(dateStr)) / 1000);
        if (s < 60) return `${s}s ago`;
        if (s < 3600) return `${Math.floor(s/60)}m ago`;
        if (s < 86400) return `${Math.floor(s/3600)}h ago`;
        return `${Math.floor(s/86400)}d ago`;
    }

    async function fetchComments() {
        try {
            const res = await fetch(`${API_BASE}/comments?limit=50`);
            return await res.json();
        } catch(e) { return []; }
    }

    function renderComments(data) {
        const list = document.getElementById('commentsList');
        if (!data || data.length === 0) {
            list.innerHTML = `<div style="color:#ffffff55;text-align:center;margin-top:40px">No comments yet — be first! 🎮</div>`;
            return;
        }
        list.innerHTML = data.map(c => `
            <div class="comment-item">
                <div class="comment-avatar" style="background:${avatarColor(c.name)}22;color:${avatarColor(c.name)}">${c.name[0].toUpperCase()}</div>
                <div class="comment-body">
                    <div class="comment-name">${c.name}</div>
                    <div class="comment-text">${c.message.replace(/</g,'&lt;')}</div>
                    <div class="comment-time">${timeAgo(c.createdAt)}</div>
                </div>
            </div>`).join('');
    }

    async function showComments() {
        document.getElementById('comments').style.display = 'flex';
        document.getElementById('commentsList').innerHTML = `<div style="color:#ffffff55;text-align:center;margin-top:40px">Loading...</div>`;
        const data = await fetchComments();
        renderComments(data);
    }

    function hideComments() {
        document.getElementById('comments').style.display = 'none';
    }

    async function sendComment() {
        const input = document.getElementById('commentText');
        const msg = input.value.trim();
        if (!msg) return;
        const name = currentPlayerName !== "Player" ? currentPlayerName : (document.getElementById('playerName').value.trim() || "Anonymous");
        input.value = '';
        input.disabled = true;
        try {
            await fetch(`${API_BASE}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, message: msg }),
            });
            const data = await fetchComments();
            renderComments(data);
        } catch(e) {}
        input.disabled = false;
        input.focus();
    }

    document.getElementById('commentText').addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(); });

    // ==================== SETTINGS / ZOOM ====================

    function showSettings() {
        document.getElementById('settings').style.display = 'flex';
        const saved = parseFloat(localStorage.getItem('hhh_zoom') || '1');
        document.querySelectorAll('.zoom-btn').forEach(btn => {
            btn.classList.toggle('active', parseFloat(btn.textContent) === saved * 100);
        });
    }

    function hideSettings() {
        document.getElementById('settings').style.display = 'none';
    }

    function applyScale(scale) {
        const gc = document.getElementById('gameContainer');
        gc.style.transform = `scale(${scale})`;
        gc.style.marginTop = Math.max(0, (window.innerHeight - scale * 890) / 2) + 'px';
    }

    function autoFitZoom() {
        const scaleH = window.innerHeight / 890;
        const scaleW = window.innerWidth / 480;
        const scale = Math.min(1, scaleH, scaleW);
        applyScale(scale);
        localStorage.setItem('hhh_zoom', scale);
        document.querySelectorAll('.zoom-btn').forEach(btn => {
            btn.classList.toggle('active', parseFloat(btn.textContent) === Math.round(scale * 100));
        });
    }

    function setZoom(scale) {
        applyScale(scale);
        localStorage.setItem('hhh_zoom', scale);
        document.querySelectorAll('.zoom-btn').forEach(btn => {
            btn.classList.toggle('active', parseFloat(btn.textContent) === scale * 100);
        });
    }

    window.addEventListener('resize', autoFitZoom);

    (function applyZoomOnLoad() {
        const scaleH = window.innerHeight / 890;
        const scaleW = window.innerWidth / 480;
        const maxFit = Math.min(1, scaleH, scaleW);
        const saved = parseFloat(localStorage.getItem('hhh_zoom') || '1');
        applyScale(Math.min(saved, maxFit));
    })();

    // ============================================================
    // GAME ENGINE
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let score = 0, level = 1, hp = 5;
    let gameRunning = false;
    let lastSpawn = 0, lastShot = 0, lastBossShot = 0;
    let enemySpeed = 3.3, spawnRate = 520, fireRate = 135;
    let autoShoot = false;
    let weaponLevel = 1, playerSpeed = 9.5;
    let bossesDefeated = 0;
    let invincibleUntil = 0;
    let cheatInput = "";
    let currentPlayerName = "Player";

    const player = { x: 220, y: 780, w: 40, h: 50 };
    let projectiles = [], enemies = [], particles = [], powerups = [], boss = null;
    const keys = {};
    let stars = [];

    function createStars() {
        stars = [];
        for(let i = 0; i < 150; i++) stars.push({x: Math.random()*480, y: Math.random()*890, size: Math.random()*3 + 0.8, speed: Math.random()*1.5 + 0.7});
    }

    class Particle {
        constructor(x, y, color) { this.x = x; this.y = y; this.size = Math.random()*8+3; this.speedX = (Math.random()-0.5)*15; this.speedY = (Math.random()-0.5)*15; this.life = 1; this.color = color; }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
        draw() { ctx.fillStyle = `rgba(${this.color},${this.life})`; ctx.fillRect(this.x, this.y, this.size, this.size); }
    }

    function createExplosion(x, y, color, count = 35) {
        count = Math.max(8, Math.floor(Math.abs(count) || 35));
        for(let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
    }

    function getEnemyHP() { return 2 + Math.floor((level - 1) / 7); }

    function spawnEnemy() {
        if (boss) return;
        const size = 32 + Math.random() * 24;
        enemies.push({ x: Math.random() * (canvas.width - size), y: -50, size, hp: getEnemyHP(), speed: enemySpeed * (0.9 + Math.random()*0.5), hitSize: size + 16 });
    }

    function spawnPowerup() { powerups.push({ x: Math.random()*(canvas.width-40), y: -40, size: 34, speed: 2.6 }); }

    function shoot() {
        const now = Date.now();
        if (now - lastShot < fireRate) return;
        lastShot = now;
        const px = player.x + 20;
        projectiles.push({x: px-8, y: player.y, vy: -22});
        projectiles.push({x: px+8, y: player.y, vy: -22});
        if (weaponLevel >= 2) projectiles.push({x: px, y: player.y-3, vy: -23});
        if (weaponLevel >= 3) {
            projectiles.push({x: px-18, y: player.y+6, vy: -21});
            projectiles.push({x: px+18, y: player.y+6, vy: -21});
        }
        if (weaponLevel >= 4) {
            projectiles.push({x: px-27, y: player.y+10, vy: -20.5});
            projectiles.push({x: px+27, y: player.y+10, vy: -20.5});
        }
    }

    function spawnBoss() {
        if (boss) return;
        let t = bossesDefeated;
        let bossHp = t === 0 ? 100 : t === 1 ? 160 : 240;
        let bullets = t === 0 ? 3 : t === 1 ? 4 : 5;
        let speed = t === 2 ? 4.7 : t === 1 ? 4.1 : 3.5;
        let w = t === 2 ? 195 : t === 1 ? 182 : 170;
        boss = { x: 115, y: 65, w: w, h: 92, hp: bossHp, maxHp: bossHp, speed: speed, changeTimer: Date.now(), bullets: bullets, type: t };
    }

    function startGame() {
        currentPlayerName = document.getElementById('playerName').value.trim() || "Player";
        localStorage.setItem('hhh_playerName', currentPlayerName);
        resetGame(1);
    }

    function startWithSelectedLevel() {
        const lvl = parseInt(document.getElementById('levelChooser').value);
        currentPlayerName = document.getElementById('playerName').value.trim() || "Player";
        localStorage.setItem('hhh_playerName', currentPlayerName);
        resetGame(lvl);
    }

    function resetGame(startLevel) {
        level = startLevel; score = startLevel * 8; hp = 5;
        weaponLevel = startLevel >= 160 ? 4 : startLevel >= 90 ? 3 : startLevel >= 30 ? 2 : 1;
        bossesDefeated = startLevel >= 14 ? 2 : startLevel >= 12 ? 1 : 0;
        enemySpeed = 3.3; spawnRate = 520; fireRate = 135; autoShoot = false;
        document.getElementById('autoShootIndicator').style.display = 'none';
        invincibleUntil = 0;
        projectiles = []; enemies = []; particles = []; powerups = []; boss = null;
        document.getElementById('level').innerText = level;
        document.getElementById('score').innerText = score;
        document.getElementById('hp').innerText = "|".repeat(hp);
        createStars();
        gameRunning = true;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('levelSelect').style.display = 'none';
        lastSpawn = Date.now() - 300;
    }

    async function endGame() {
        gameRunning = false;
        if (score > 0) {
            await submitScore(currentPlayerName, score);
        }
        setTimeout(() => document.getElementById('lobby').style.display = 'flex', 800);
    }

    function showMessage(text, color = "#00ff88") {
        const msg = document.getElementById('msg');
        msg.style.color = color; msg.innerHTML = text; msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 1600);
    }

    function showLevelSelect() { document.getElementById('levelSelect').style.display = 'flex'; }
    function hideLevelSelect() { document.getElementById('levelSelect').style.display = 'none'; }

    function update() {
        if (!gameRunning) return requestAnimationFrame(update);

        if (keys['ArrowLeft'] && player.x > 5) player.x -= playerSpeed;
        if (keys['ArrowRight'] && player.x < 435) player.x += playerSpeed;
        if (keys['Space'] || autoShoot) shoot();

        if (score >= level * 9) {
            level++;
            document.getElementById('level').innerText = level;
            enemySpeed += 0.22;
            spawnRate = Math.max(280, spawnRate - 25);
            showMessage("LEVEL UP!", "#ffff00");
        }

        if (Date.now() - lastSpawn > spawnRate && !boss) { spawnEnemy(); lastSpawn = Date.now(); }
        if (Math.random() < 0.015) spawnPowerup();

        if (score >= 30 && weaponLevel === 1) { weaponLevel = 2; showMessage("WEAPON LEVEL 2"); }
        if (score >= 90 && weaponLevel === 2) { weaponLevel = 3; showMessage("WEAPON LEVEL 3"); }
        if (score >= 160 && weaponLevel === 3) { weaponLevel = 4; showMessage("MAX WEAPON!"); }

        if (!boss) {
            if (score >= 180 && bossesDefeated < 2) spawnBoss();
            else if (score >= 110 && bossesDefeated < 1) spawnBoss();
            else if (score >= 40 && bossesDefeated === 0) spawnBoss();
        }

        stars.forEach(s => { s.y += s.speed; if (s.y > 890) s.y = -5; });

        if (boss) {
            if (Date.now() - boss.changeTimer > 600 + Math.random()*700) {
                boss.speed = (Math.random() - 0.5) * (boss.type === 2 ? 8 : 7);
                boss.y = 50 + Math.random() * 220;
                boss.changeTimer = Date.now();
            }
            boss.x += boss.speed;
            if (boss.x < 30 || boss.x > canvas.width - boss.w - 30) boss.speed *= -1;
        }

        for (let i = projectiles.length-1; i >= 0; i--) {
            projectiles[i].y += projectiles[i].vy || 7;
            if (projectiles[i].y < -30 || projectiles[i].y > canvas.height + 30) projectiles.splice(i,1);
        }

        for (let i = enemies.length-1; i >= 0; i--) {
            let e = enemies[i];
            e.y += e.speed;
            if (e.y > canvas.height) {
                if (Date.now() >= invincibleUntil) {
                    hp--;
                    document.getElementById('hp').innerText = "|".repeat(hp);
                    if (hp <= 0) { enemies.splice(i,1); endGame(); continue; }
                }
                createExplosion(e.x + e.size/2, canvas.height-40, "255,60,60");
                enemies.splice(i,1);
                continue;
            }
            for (let j = projectiles.length-1; j >= 0; j--) {
                let p = projectiles[j];
                if (!p.isBossBullet && p.x > e.x - 8 && p.x < e.x + e.hitSize && p.y > e.y - 8 && p.y < e.y + e.hitSize) {
                    e.hp--; projectiles.splice(j,1);
                    if (e.hp <= 0) {
                        createExplosion(e.x + e.size/2, e.y + e.size/2, "255,180,50", 45);
                        enemies.splice(i,1);
                        score += 1;
                        document.getElementById('score').innerText = score;
                    }
                    break;
                }
            }
        }

        if (boss) {
            if (Date.now() - lastBossShot > 680) {
                lastBossShot = Date.now();
                const bx = boss.x + boss.w / 2;
                for (let i = 0; i < boss.bullets; i++) {
                    const offset = (i - (boss.bullets-1)/2) * 17;
                    projectiles.push({x: bx + offset, y: boss.y + boss.h, vy: 7.2, isBossBullet: true});
                }
            }
            for (let j = projectiles.length-1; j >= 0; j--) {
                let p = projectiles[j];
                if (!p.isBossBullet && p.x > boss.x && p.x < boss.x + boss.w && p.y > boss.y && p.y < boss.y + boss.h) {
                    boss.hp--; projectiles.splice(j,1);
                    if (boss.hp <= 0) {
                        createExplosion(boss.x + boss.w/2, boss.y + boss.h/2, "255,215,0", 130);
                        score += 60;
                        bossesDefeated++;
                        boss = null;
                        invincibleUntil = Date.now() + 10000;
                        showMessage("🛡️ SHIELD 10s!", "#00ffff");
                        document.getElementById('score').innerText = score;
                        enemies.forEach(e => e.hp = getEnemyHP());
                    }
                    break;
                }
            }
        }

        for (let i = projectiles.length-1; i >= 0; i--) {
            let p = projectiles[i];
            if (p.isBossBullet && p.x > player.x - 15 && p.x < player.x + player.w + 15 && p.y > player.y && p.y < player.y + player.h) {
                if (Date.now() < invincibleUntil) {
                    projectiles.splice(i,1);
                    continue;
                }
                hp--;
                document.getElementById('hp').innerText = "|".repeat(hp);
                createExplosion(player.x + 20, player.y + 25, "255,50,50", 35);
                projectiles.splice(i,1);
                if (hp <= 0) endGame();
            }
        }

        for (let i = powerups.length-1; i >= 0; i--) {
            let p = powerups[i];
            p.y += p.speed;
            if (p.y > canvas.height) { powerups.splice(i,1); continue; }
            if (p.x < player.x + player.w && p.x + p.size > player.x && p.y < player.y + player.h && p.y + p.size > player.y) {
                if (hp < 7) {
                    hp++;
                    document.getElementById('hp').innerText = "|".repeat(hp);
                    showMessage("+1 LIFE", "#00ff88");
                    createExplosion(p.x+17, p.y+17, "0,255,140");
                }
                powerups.splice(i,1);
            }
        }

        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i,1);
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = 'rgba(5,5,5,0.42)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

        const shieldActive = Date.now() < invincibleUntil;
        ctx.shadowBlur = 35; ctx.shadowColor = "#00ffff";
        ctx.fillStyle = shieldActive ? `rgba(0,255,255,${0.5 + 0.5 * Math.sin(Date.now()/80)})` : "#00ffff";
        ctx.beginPath();
        ctx.moveTo(player.x+20, player.y);
        ctx.lineTo(player.x, player.y+48);
        ctx.lineTo(player.x+40, player.y+48);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (shieldActive) {
            const secs = Math.ceil((invincibleUntil - Date.now()) / 1000);
            ctx.shadowBlur = 40; ctx.shadowColor = "#00ffff";
            ctx.strokeStyle = `rgba(0,255,255,${0.4 + 0.4 * Math.sin(Date.now()/100)})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 24, 38, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#00ffff";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`🛡️ ${secs}s`, player.x + 20, player.y - 8);
            ctx.textAlign = "left";
        }

        ctx.shadowBlur = 20; ctx.shadowColor = "#ffff00";
        ctx.fillStyle = "#ffff00";
        projectiles.forEach(p => { if (!p.isBossBullet) ctx.fillRect(p.x-3, p.y, 6, 26); });
        ctx.shadowBlur = 0;

        ctx.shadowBlur = 20; ctx.shadowColor = "#ff4400";
        ctx.fillStyle = "#ff4400";
        projectiles.forEach(p => { if (p.isBossBullet) ctx.fillRect(p.x-4, p.y, 8, 20); });
        ctx.shadowBlur = 0;

        ctx.shadowBlur = 24; ctx.shadowColor = "#ff3366";
        enemies.forEach(e => {
            ctx.fillStyle = `rgb(255, ${70 + e.hp*45}, 80)`;
            ctx.fillRect(e.x, e.y, e.size, e.size);
        });
        ctx.shadowBlur = 0;

        ctx.shadowBlur = 22; ctx.shadowColor = "#ff0088";
        powerups.forEach(p => {
            ctx.fillStyle = "#ff0088";
            ctx.fillRect(p.x + 4, p.y + 4, p.size-8, p.size-8);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 30px Arial";
            ctx.fillText("♥", p.x + 6, p.y + 31);
        });
        ctx.shadowBlur = 0;

        if (boss) {
            let color = boss.type === 2 ? "#ff00aa" : boss.type === 1 ? "#aa00ff" : "#ff3366";
            ctx.shadowBlur = 65; ctx.shadowColor = color;
            ctx.fillStyle = "#660022";
            ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
            ctx.shadowBlur = 40; ctx.shadowColor = "#ff88ff";
            ctx.fillStyle = "#ff55bb";
            ctx.fillRect(boss.x + 30, boss.y + 20, boss.w - 60, 35);

            const barW = boss.w * (boss.hp / boss.maxHp);
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.fillRect(boss.x, boss.y - 35, boss.w, 18);
            ctx.fillStyle = boss.hp > 70 ? "#00ffaa" : "#ff3333";
            ctx.fillRect(boss.x, boss.y - 35, barW, 18);
            ctx.shadowBlur = 0;
        }
        particles.forEach(p => p.draw());
    }

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'KeyE' && gameRunning) {
            autoShoot = !autoShoot;
            document.getElementById('autoShootIndicator').style.display = autoShoot ? 'inline' : 'none';
            showMessage(autoShoot ? "🔫 AUTO SHOOT ON" : "AUTO SHOOT OFF", autoShoot ? "#ffff00" : "#aaaaaa");
        }
        if (e.key) {
            cheatInput += e.key.toLowerCase();
            if (cheatInput.length > 15) cheatInput = cheatInput.slice(-15);
            if (cheatInput.includes("idi")) {
                showLevelSelect();
                cheatInput = "";
            }
        }
    });

    window.addEventListener('keyup', e => keys[e.code] = false);

    const nameInput = document.getElementById('playerName');
    const startBtn = document.getElementById('startBtn');

    const savedName = localStorage.getItem('hhh_playerName');
    if (savedName) {
        nameInput.value = savedName;
        startBtn.disabled = false;
    }

    nameInput.addEventListener('input', () => startBtn.disabled = nameInput.value.trim().length < 1);

    requestAnimationFrame(update);
    createStars();
</script>
</body>
</html>
